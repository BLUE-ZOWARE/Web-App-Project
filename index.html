<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embarcadero Explorer | SF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">EMBARCADERO <span class="text-primary">SF</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#catalog">Explore Places</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container text-center text-white">
            <h1 class="display-2 fw-bold">The Waterfront Awaits</h1>
            <p class="lead">A curated guide to San Francisco's historic eastern shoreline.</p>
        </div>
    </header>

    <main class="container my-5" id="catalog">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold">Featured Spots</h2>
                <hr class="border-primary border-3 opacity-75" style="width: 60px;">
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="places-container">
            <div class="text-center w-100">
                <p>Loading the Embarcadero...</p>
            </div>
        </div>

<div id="detail-panel" class="detail-panel">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <div class="panel-content">
        <div class="panel-image" id="panel-image"></div>
        <div class="panel-info">
            <h2 id="panel-title" class="display-5 fw-bold"></h2>
            <hr class="border-primary border-3 opacity-75" style="width: 60px;">
            <p id="panel-description" class="lead"></p>
            <div id="panel-extra-details" class="mt-4"></div>
            <a id="panel-link" href="#" target="_blank" class="btn btn-primary mt-4 rounded-pill px-5">Visit Official Site</a>
        </div>
    </div>
</div>
<div id="overlay" class="overlay" onclick="closePanel()"></div>

    </main>
    <footer class="bg-light py-4 text-center border-top">
        <p class="text-muted small">SF Embarcadero Guide &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="script.js"></script>

    <!-- Modal Storing for detailed info -->

<div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold text-primary" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="modalBio" class="text-muted"></p>
        <div id="modalDetails" class="mt-3 small border-top pt-3"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
