<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embarcadero Explorer | SF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-5"> <a class="navbar-brand fw-bold" href="#">EMBARCADERO <span class="text-primary">SF</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#catalog">Explore Places</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container text-center text-white">
            <h1 class="display-2 fw-bold">The Bay Awaits</h1>
            <p class="lead">A curated guide to San Francisco's historic eastern shoreline.</p>
        </div>
    </header>

    <main class="container-fluid px-5 my-5" id="catalog">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2 class="fw-bold">Featured Spots</h2>
                <hr class="accent-hr">
            </div>
            <div class="col-md-4">
                <select id="sortSelect" class="form-select rounded-pill border-2 shadow-sm" onchange="handleSort()">
                    <option value="default">Default Order</option>
                    <option value="most-liked">Most Liked ❤️</option>
                    <option value="least-liked">Least Liked</option>
                </select>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="places-container">
            <div class="text-center w-100 py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Loading the Embarcadero...</p>
            </div>
        </div>
    </main>

    <footer class="bg-light py-4 text-center border-top">
        <p class="text-muted small">SF Embarcadero Guide &copy; 2026</p>
    </footer>

    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h4 class="modal-title fw-bold text-uppercase" id="modalTitle"></h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2">
                    <p id="modalBio"></p>
                    <div id="modalDetails" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
